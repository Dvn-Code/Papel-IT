name: Package Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Create Windows EXE Installer
        run: |
          mkdir target/jpackage
          jpackage `
            --type exe `
            --dest target/jpackage `
            --name "Papel IT" `
            --app-version 1.0.0 `
            --vendor "PapelIT" `
            --main-jar papelit-1.0.0.jar `
            --main-class com.example.papelit.StickyNotesLauncher `
            --input target/libs `
            --icon src/main/resources/icon.ico `
            --win-dir-chooser `
            --win-shortcut `
            --win-menu `
            --description "Papel IT - A beautiful sticky notes application"
        shell: pwsh

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: Papel-IT-Windows-Installer
          path: target/jpackage/*.exe
